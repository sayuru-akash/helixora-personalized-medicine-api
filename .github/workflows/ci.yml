name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  django-checks:
    runs-on: ubuntu-latest
    env:
      DJANGO_ENV: local
      DJANGO_SECRET_KEY: django-insecure-ci-local-only
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000,http://localhost:8000
      DJANGO_DB_ENGINE: django.db.backends.sqlite3
      DJANGO_DB_NAME: ":memory:"
      CELERY_TASK_ALWAYS_EAGER: "True"
      HELIXORA_AI_PROVIDER: placeholder

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Dependency consistency check
        run: python -m pip check

      - name: Dependency vulnerability audit
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Test suite
        run: python manage.py test

      - name: Production deploy check
        env:
          DJANGO_ENV: production
          DJANGO_SETTINGS_MODULE: config.settings.production
          DJANGO_SECRET_KEY: "ci-production-secret-v1-abcdefghijklmnopqrstuvwxyz-1234567890"
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: api.helixora.example
          DJANGO_CSRF_TRUSTED_ORIGINS: https://api.helixora.example
          DJANGO_SECURE_SSL_REDIRECT: "true"
          DJANGO_SESSION_COOKIE_SECURE: "true"
          DJANGO_CSRF_COOKIE_SECURE: "true"
          DJANGO_SECURE_HSTS_SECONDS: "31536000"
          CELERY_TASK_ALWAYS_EAGER: "True"
          HELIXORA_AI_PROVIDER: placeholder
        run: python scripts/check.py
